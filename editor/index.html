<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RAN Scene Editor</title>
    <link rel="stylesheet" href="./src/styles/editor.css">
  </head>
  <body>
    <div id="app" class="editor-shell">
      <header class="topbar">
        <div>
          <h1>RAN Scene Editor</h1>
          <p>二维场景属性编辑与实时预览</p>
        </div>
        <div class="toolbar">
          <label class="scene-picker">
            <span>场景</span>
            <select id="sceneSelect" title="选择场景"></select>
          </label>
          <button id="saveButton" type="button" class="primary" title="保存当前更改">保存</button>
          <button id="fitViewButton" type="button" title="适配视图">适配</button>
          <button id="highlightIndoorButton" type="button" title="高亮室内区域">室内</button>
          <button id="exportButton" type="button" title="导出当前场景 JSON">导出 JSON</button>
        </div>
      </header>

      <main class="workspace">
        <aside class="property-panel" aria-label="属性编辑器">
          <div class="panel-header">
            <span>属性编辑器</span>
          </div>
          <div id="propertyEditor" class="property-content"></div>
        </aside>

        <section class="preview-panel" aria-label="场景预览">
          <div class="panel-header">
            <span>场景预览</span>
            <span id="statusText" class="status-text">未保存</span>
          </div>
          <div class="canvas-wrap">
            <canvas id="sceneCanvas" width="1200" height="820"></canvas>
            <div id="contextMenu" class="context-menu" hidden></div>
          </div>
        </section>
      </main>
    </div>

    <script type="module" src="./src/app/main.js"></script>
  </body>
</html>
